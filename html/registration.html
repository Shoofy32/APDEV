<!DOCTYPE html>

<html lang="en">

    <head>

        <meta charset="utf-8">

        <title> Blevvit - Register </title>

        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <!-- Link CSS File for login and register form css design -->
        <link rel="stylesheet" href="../css/login_register_form_style.css">

        <!-- Link JS File for registration interaction -->
        <script src="../javascript/registration.js"></script>

        <link rel = "icon" href="../resources/images/flag.png" type = "image/png"></linkrel>
        
    </head>

    <body>

        <article>

                <header>
                    <a class = "logo" href = "../html/homepage.html"> <img src = "../resources/images/Blevvit_Logo.png"> </a>
                </header>

        </article>

        <div class="mainbox">
        <h4> Sign up and register for free!</h4>
        <h6> Signing up for an account allows you to interact with posts</h6>

        <h6> Already have an account? <a href="login.html" >Login</a></h6>

        <div class="mb-3">
        <input class="form-control" type="text" id="user" placeholder="Username" aria-label="default input example">
        </div>
        
        <div class="mb-3">
            <input type="email" class="form-control" id="email" placeholder="Email address">
        </div>

        <div class="mb-3">
            <input type="password" id="pass" class="form-control" aria-describedby="passwordHelpBlock" placeholder="Password">
        </div>
        
        <div class="mb-3">
            <input type="password" id="passconfirm" class="form-control" aria-describedby="passwordHelpBlock" placeholder="Confirm Password">
        </div>
    
        <button type="button" class="btn btn-success" id="register">Register</button>
        </div>
        
    </body>

</html>
