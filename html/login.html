<html lang="en">

    <head>

        <meta charset="utf-8">

        <title> Blevvit - Login </title>

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <!-- Link CSS File for login and register form css design -->
        <link rel="stylesheet" href="../css/login_register_form_style.css">

        <!-- Link JS File for login interaction -->
        <script src="../javascript/login.js" type="text/javascript"></script>

        <!-- Link JS File for logins -->
        <script src = "../javascript/log_reg_header.js"></script>

        <link rel = "icon" href="../resources/images/flag.png" type = "image/png"></linkrel>

    </head>

    <body>

        <article>
                <header>
                    <a class = "logo"> <img src = "../resources/images/Blevvit_Logo.png"> </a>
                </header>
        </article>

        <div class = "mainbox">
        <h4> Welcome back!</h4>
        <h6> Don't have an account? <a href="/register" >Sign up</a></h6>

        <form action="/logUser" method="post" class = "form">
            <div class="mb-3">
                <input type="username" class="form-control" id="username" placeholder="Username" name="username">
            </div>

            <input type="password" id="password" class="form-control" aria-describedby="passwordHelpBlock" placeholder="Password" name="password">
            <button type="submit" class="btn btn-success" >Login</button>
        </form>
        
        </div>
        

    </body>

</html>
