<html>
    <head>
        <link href="post.css" rel="stylesheet"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <!-- Link JS File for posts interaction -->
        <script type = "module" src = "searchbar.js"></script>
    </head>
    <body>

        
   
    <article>


            <header>

                <!-- Logo -->
                <a class = "logo" href = "../home_page/homepage.html"> <img src = "../resources/images/Blevvit_Logo.png"> </a>

                
                <!-- Search bar -->
                 <div class = "search_bar">

                    <i class="fa-solid fa-magnifying-glass fa-lg" style = "color: #ffffff;"></i>

                    <input type = "text" placeholder = "Search..." onkeydown = "searchPost(this, event)">

                 </div>


                <!-- Log In and Sign Up Buttons -->
                <div class = "log_sign_in">

                    <button onclick = "window.open('../log_regpage/login.html', '_self')"> Log In </button>
                    <button onclick = "window.open('../log_regpage/registration.html', '_self')"> Sign Up </button>

                </div>


            </header>


        </article>
        <div class="content_container">
             <div class="visited_container">
                <div class="breadcrumbs">
                    <a href="forum.html">Forums&nbsp; </a>
                    <span class="separator">
                    <h5> - </h5>
                    </span>
                     <a href="CCAPDEV">&nbsp;CCAPDEV</a>
               
                </div>
            
           
               

          

            </div>
        
        
            <form>
                <div class="post_container">
                <div class="title_container">
                    <input id="title" name="title" placeholder="Title"/>
                </div>
                
           
               <div id="tag_container">

               </div>
                <textarea id="content" name="content" placeholder="Body"></textarea>
            
                    <div id="add_tag_container">
                    <button id="add_tag">
                    Add Tag
                </button>
                </div>
                <button onclick="addPost()" type="button" id="post">Post</button>
                </div>
            </form>
        
            
          
        </div>

    <div class="challenge" id="challenge_container">
        <div>
            <button id="closeChallenge"><img src="x-octagon.svg"/></button> 
        </div>
        
        
        <input id="addTags" type="text" placeholder="Enter a tag"></input>

       
         <div id="confirm_post">
            <button id="postTag">Add</button> 
        </div>
    </div>
        
       
    </div>
        

        
    <script>

async function addPost() {
  const username = "TheNiggaDude"
  const params = new URLSearchParams(window.location.search);
  const forum_name = params.get("forum");
  const post_title = document.getElementById('title').value
  const post_content = document.getElementById('content').value

  await fetch("http://localhost:5000/add-post", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, post_title, post_content, forum_name })
  });

 

}



</script>
 </body>

</html>
