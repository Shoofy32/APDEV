<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="design.css">
    <title>Register</title>
  </head>
  <body>
    <h4> Sign up and register for free!</h4>
    <h6> Signing up for an account allows you to interact with posts</h6>
    <h6> Already have an account? <a href="login.html" >Login</a></h6>
    
    <div class="form-floating">
    <input class="form-control" placeholder="Enter your username" id="floatingTextarea"></input>
    <label for="floatingTextarea">Username</label>
    </div>

    <div class="form-floating">
    <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
    <label for="floatingInput">Email</label>
    </div>

    <div class="form-floating">
    <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
    <label for="floatingPassword">Password</label>
    </div>

    <div class="form-floating">
    <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
    <label for="floatingPassword">Confirm Password</label>
    </div>

    <div class="form-floating">
      <button type="button" class="btn btn-success">Register</button>
    </div>
  </body>
</html>
